appId: online.tipson.studio
productName: TIPSON Studio
copyright: © MARZIN CONSULTING

directories:
  buildResources: build
  output: release

files:
  - out/**
  - package.json

# Enregistre le protocole tipson:// (retour d'auth Google depuis tipson.online)
protocols:
  - name: TIPSON
    schemes: [tipson]

mac:
  target: dmg
  category: public.app-category.music
  icon: build/icon.png
  # Signature/notarisation : à activer avec un compte Apple Developer (Phase prod)
  # hardenedRuntime: true
  # notarize: true

win:
  target: nsis
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target: AppImage
  category: Audio
  icon: build/icon.png
